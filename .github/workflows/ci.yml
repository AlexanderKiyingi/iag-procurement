name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iag
          POSTGRES_PASSWORD: iag_dev
          POSTGRES_DB: iag_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iag -d iag_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Create service schema
        env:
          PGPASSWORD: iag_dev
        run: psql -h localhost -U iag -d iag_platform -c 'CREATE SCHEMA IF NOT EXISTS iag_procurement;'

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: go mod tidy
        run: go mod tidy

      - name: Build
        run: go build -v ./...
        env:
          DATABASE_URL: postgres://iag:iag_dev@localhost:5432/iag_platform?sslmode=disable&search_path=iag_procurement
          REDIS_URL: redis://localhost:6379/0

      - name: Test
        run: go test ./...
        env:
          DATABASE_URL: postgres://iag:iag_dev@localhost:5432/iag_platform?sslmode=disable&search_path=iag_procurement
          REDIS_URL: redis://localhost:6379/0

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t iag-procurement:ci .
