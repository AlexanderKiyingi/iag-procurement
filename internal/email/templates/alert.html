<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{.Title}}</title>
</head>
<body style="margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#f4f6f8;color:#1a1d21;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.06);">
          <tr>
            <td style="background:#0f5132;padding:20px 24px;color:#fff;font-size:18px;font-weight:600;">
              IAG Procurement
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <h1 style="margin:0 0 12px;font-size:20px;line-height:1.3;">{{.Title}}</h1>
              <p style="margin:0 0 16px;font-size:15px;line-height:1.55;color:#3d4450;">{{.Message}}</p>
              {{if .Detail}}
              <div style="font-size:13px;line-height:1.5;color:#5c6570;background:#f8fafc;border-radius:8px;padding:12px 14px;border:1px solid #e5e9ef;">
                {{.Detail}}
              </div>
              {{end}}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 24px;font-size:12px;color:#8b939e;border-top:1px solid #eef1f5;">
              Sent by the procurement notification service. Do not reply to this automated message.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
